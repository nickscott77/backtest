<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backtest</title>
  <meta name="description" content="Schlanke Backtest-Web-App mit historischem Kurschart und Kennzahlen." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Historische Kursanalyse</p>
        <h1>Backtest</h1>
      </div>
      <nav class="topnav" aria-label="Hauptnavigation">
        <a href="help.html">Hilfe</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel controls" aria-labelledby="symbol-heading">
        <div class="control-group">
          <label for="symbol-input" id="symbol-heading">Symbol</label>
          <div class="input-row">
            <input id="symbol-input" name="symbol" type="text" inputmode="latin" autocomplete="off" spellcheck="false" placeholder="AAPL" value="AAPL" />
            <button id="run-backtest" class="primary">Backtest starten</button>
          </div>
          <p class="hint">Beispiel: AAPL, MSFT, SAP, NVDA</p>
        </div>

        <div class="control-group">
          <span class="label">Zeitraum</span>
          <div class="segmented" role="tablist" aria-label="Zeitraum wählen">
            <button class="range-btn active" data-range="1w" type="button">1 Woche</button>
            <button class="range-btn" data-range="1m" type="button">1 Monat</button>
            <button class="range-btn" data-range="1y" type="button">1 Jahr</button>
            <button class="range-btn" data-range="5y" type="button">5 Jahre</button>
          </div>
        </div>
      </section>

      <section class="panel chart-panel" aria-labelledby="chart-title">
        <div class="chart-header">
          <div>
            <p class="eyebrow">Kursverlauf</p>
            <h2 id="chart-title">Aktienkurs</h2>
          </div>
          <div class="status-stack">
            <span id="data-source" class="badge">Live-Daten</span>
            <span id="load-status" class="muted">Bereit.</span>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="price-chart" aria-label="Linienchart mit Kursverlauf" role="img"></canvas>
        </div>
      </section>

      <section class="metrics" aria-label="Kennzahlen">
        <article class="metric-card">
          <span class="metric-label">Startkurs</span>
          <strong id="start-price">—</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Endkurs</span>
          <strong id="end-price">—</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Rendite %</span>
          <strong id="return-percent">—</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Max Drawdown</span>
          <strong id="max-drawdown">—</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">Volatilität</span>
          <strong id="volatility">—</strong>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
